name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: ''
      run-command:
        description: Command to run for CI (lint, build, test, etc.)
        type: string
        default: yarn turbo run lint build test
      upload-coverage:
        description: Whether to upload coverage artifacts
        type: boolean
        default: true
      node-options:
        description: NODE_OPTIONS passed to Node steps
        type: string
        default: '--max-old-space-size=4096'
      node-version-file:
        description: File to read Node.js version from (defaults to .nvmrc)
        type: string
        default: '.nvmrc'
    secrets:
      packages-token:
        description: GitHub PAT with packages:read for @mvng-nz package installs
        required: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: ./.github/workflows/node-runner.yml
    with:
      node-version: ${{ inputs.node-version }}
      node-version-file: ${{ inputs.node-version-file }}
      node-options: ${{ inputs.node-options }}
      run-command: ${{ inputs.run-command }}
      upload-coverage: ${{ inputs.upload-coverage }}
    secrets:
      packages-token: ${{ secrets.packages-token }}
