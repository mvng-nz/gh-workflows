name: Flutter Package CI

on:
  workflow_call:
    inputs:
      flutter-versions:
        description: JSON array of Flutter versions to test against. Each entry is an object with either `version` (e.g. "3.41.0") or `channel` (e.g. "stable").
        type: string
        default: '[{"version": "3.41.0"}, {"channel": "stable"}]'
      analyze-flags:
        description: Flags passed to `flutter analyze`.
        type: string
        default: '--fatal-infos'
      runs-on:
        description: Runner image to use.
        type: string
        default: ubuntu-latest

jobs:
  analyze:
    name: Analyze (${{ matrix.entry.version || matrix.entry.channel }})
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(inputs.flutter-versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.entry.channel || 'stable' }}
          flutter-version: ${{ matrix.entry.version || '' }}
      - run: flutter pub get
      - run: flutter analyze ${{ inputs.analyze-flags }}

  format:
    name: Format (${{ matrix.entry.version || matrix.entry.channel }})
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(inputs.flutter-versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.entry.channel || 'stable' }}
          flutter-version: ${{ matrix.entry.version || '' }}
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .

  test:
    name: Test (${{ matrix.entry.version || matrix.entry.channel }})
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(inputs.flutter-versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.entry.channel || 'stable' }}
          flutter-version: ${{ matrix.entry.version || '' }}
      - run: flutter pub get
      - run: flutter test
