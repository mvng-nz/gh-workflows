name: Cloudflare Pages Deploy

on:
  workflow_call:
    inputs:
      build-command:
        description: Command to build the static site
        type: string
        required: true
      publish-dir:
        description: Directory containing the built static site (e.g. dist, build, out)
        type: string
        required: true
      project-name:
        description: Cloudflare Pages project name
        type: string
        required: true
      branch:
        description: Branch to deploy (defaults to the current ref)
        type: string
        default: ''
      ref:
        description: Git ref to checkout (defaults to the current ref)
        type: string
        default: ''
      node-version:
        description: Node.js version to use
        type: string
        default: ''
      node-version-file:
        description: File to read Node.js version from (defaults to .nvmrc)
        type: string
        default: '.nvmrc'
      wrangler-version:
        description: Wrangler version to use
        type: string
        default: '4'
    secrets:
      packages-token:
        description: GitHub PAT with packages:read for @mvng-nz package installs
        required: true
      cloudflare-api-token:
        description: Cloudflare API token with Cloudflare Pages edit permissions
        required: true
      cloudflare-account-id:
        description: Cloudflare account ID
        required: true
      github-token:
        description: GitHub token for GitHub Deployments integration (optional)
        required: false

permissions:
  contents: read
  packages: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Resolve Node version
        id: resolve-node
        run: |
          if [ -n "${{ inputs.node-version }}" ]; then
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.node-version-file }}" ]; then
            echo "version=$(cat ${{ inputs.node-version-file }})" >> "$GITHUB_OUTPUT"
          else
            echo "version=24" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.resolve-node.outputs.version }}
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.cloudflare-api-token }}
          accountId: ${{ secrets.cloudflare-account-id }}
          wranglerVersion: ${{ inputs.wrangler-version }}
          command: pages deploy "${{ inputs.publish-dir }}" "--project-name=${{ inputs.project-name }}"${{ inputs.branch && format(' "--branch={0}"', inputs.branch) || '' }}
          gitHubToken: ${{ secrets.github-token }}
