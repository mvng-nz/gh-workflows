name: Storybook Test & Deploy

on:
  workflow_call:
    secrets:
      packages-token:
        description: GitHub PAT with packages:read for @mvng-nz package installs
        required: true
      chromatic-project-token:
        description: Chromatic project token for storybook deployment
        required: true

permissions:
  contents: read
  packages: read

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Run Storybook tests
        run: yarn turbo run test-storybook

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Build Storybook
        run: yarn turbo run build-storybook

      - name: Publish to Chromatic
        run: npx chromatic --storybook-build-dir storybook-static --exit-once-uploaded
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.chromatic-project-token }}
