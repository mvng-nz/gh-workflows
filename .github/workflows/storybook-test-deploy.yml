name: Storybook Test & Deploy

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: ''
      node-version-file:
        description: File to read Node.js version from (defaults to .nvmrc)
        type: string
        default: '.nvmrc'
      node-options:
        description: NODE_OPTIONS passed to Node steps
        type: string
        default: '--max-old-space-size=4096'
    secrets:
      packages-token:
        description: GitHub PAT with packages:read for @mvng-nz package installs
        required: true
      chromatic-project-token:
        description: Chromatic project token for storybook deployment
        required: true

permissions:
  contents: read
  packages: read

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: ${{ inputs.node-options }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Node version
        id: resolve-node
        run: |
          if [ -n "${{ inputs.node-version }}" ]; then
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.node-version-file }}" ]; then
            echo "version=$(cat ${{ inputs.node-version-file }})" >> "$GITHUB_OUTPUT"
          else
            echo "version=24" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.resolve-node.outputs.version }}
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Storybook tests
        run: yarn turbo run test-storybook

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: storybook-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: ${{ inputs.node-options }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve Node version
        id: resolve-node
        run: |
          if [ -n "${{ inputs.node-version }}" ]; then
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.node-version-file }}" ]; then
            echo "version=$(cat ${{ inputs.node-version-file }})" >> "$GITHUB_OUTPUT"
          else
            echo "version=24" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.resolve-node.outputs.version }}
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Build Storybook
        run: yarn turbo run build-storybook

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@v17
        with:
          projectToken: ${{ secrets.chromatic-project-token }}
          storybookBuildDir: storybook-static
          exitOnceUploaded: true

      - name: Chromatic build URL
        if: always()
        run: 'echo "Chromatic build: ${{ steps.chromatic.outputs.url }}"'
