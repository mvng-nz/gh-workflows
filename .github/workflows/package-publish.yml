name: Package Publish

on:
  workflow_call:
    secrets:
      packages-token:
        description: GitHub PAT with packages:write for publishing to GitHub Packages
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          PKG=$(node -e "process.stdout.write(require('./package.json').version)")
          if [ "${TAG#v}" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Publish package
        run: yarn npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}
