name: Playwright E2E

on:
  workflow_call:
    inputs:
      run-command:
        description: Command to run Playwright E2E tests
        type: string
        required: true
      working-directory:
        description: Working directory for test steps
        type: string
        default: '.'
      browser:
        description: Playwright browser to install
        type: string
        default: 'chromium'
      node-version:
        description: Node.js version to use
        type: string
        default: ''
      node-version-file:
        description: File to read Node.js version from (defaults to .nvmrc)
        type: string
        default: '.nvmrc'
      node-options:
        description: NODE_OPTIONS passed to Node steps
        type: string
        default: '--max-old-space-size=4096'
      upload-artifacts:
        description: Whether to upload test artifacts
        type: boolean
        default: false
      artifact-name:
        description: Name of the uploaded artifact
        type: string
        default: 'playwright-report'
      artifact-path:
        description: Path to the artifacts to upload
        type: string
        default: 'playwright-report/'
      retention-days:
        description: Artifact retention in days
        type: number
        default: 14
    secrets:
      packages-token:
        description: GitHub PAT with packages:read for @mvng-nz package installs
        required: true

permissions:
  contents: read
  packages: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: ${{ inputs.node-options }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Node version
        id: resolve-node
        run: |
          if [ -n "${{ inputs.node-version }}" ]; then
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.node-version-file }}" ]; then
            echo "version=$(cat ${{ inputs.node-version-file }})" >> "$GITHUB_OUTPUT"
          else
            echo "version=24" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.resolve-node.outputs.version }}
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable
        working-directory: ${{ inputs.working-directory }}

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ inputs.browser }}
        working-directory: ${{ inputs.working-directory }}

      - name: Run E2E command
        run: ${{ inputs.run-command }}
        working-directory: ${{ inputs.working-directory }}

      - name: Upload artifacts
        if: always() && inputs.upload-artifacts == true
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.retention-days }}
