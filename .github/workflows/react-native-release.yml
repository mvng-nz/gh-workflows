name: React Native Package Release

on:
  workflow_call:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## $VERSION\$/{f=1;next} /^## /{f=0} f" CHANGELOG.md)
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "$BODY"
