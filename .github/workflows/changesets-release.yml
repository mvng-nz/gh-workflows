name: Changesets Release

on:
  workflow_call:
    inputs:
      build-command:
        description: Command to build packages before publishing
        type: string
        required: true
      version-script:
        description: Script to run for versioning (passed to changesets/action)
        type: string
        default: ''
      publish-script:
        description: >
          Command that publishes packages, run in a shell AFTER the Version PR
          merges (when no changesets remain). Runs via a shell step — NOT
          changesets/action's publish — so `yarn npm publish` rewrites
          `workspace:*` ranges at pack time. Default publishes every public
          workspace with Yarn; private-only repos can leave the default (it
          publishes nothing) and rely on the tag/release steps.
        type: string
        default: 'yarn workspaces foreach --all --no-private npm publish --tolerate-republish'
      create-github-releases:
        description: Whether to create GitHub releases for the tags cut this run
        type: boolean
        default: true
      push-git-tags:
        description: Whether to create and push git tags (via `yarn changeset tag`)
        type: boolean
        default: true
      setup-git-user:
        description: Whether changesets/action should configure the git user
        type: boolean
        default: true
      github-token:
        description: GitHub token for changesets/action (defaults to github.token)
        type: string
        default: ''
      node-version:
        description: Node.js version to use
        type: string
        default: ''
      node-version-file:
        description: File to read Node.js version from (defaults to .nvmrc)
        type: string
        default: '.nvmrc'
      node-options:
        description: NODE_OPTIONS passed to Node steps
        type: string
        default: '--max-old-space-size=4096'
    secrets:
      packages-token:
        description: GitHub PAT with read:packages for installing cross-repo org deps (optional)
        required: false
      npm-token:
        description: npm token for publishing to npmjs.com (omit for GitHub Packages / tag-only)
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: ${{ inputs.node-options }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve Node version
        id: resolve-node
        run: |
          if [ -n "${{ inputs.node-version }}" ]; then
            echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          elif [ -f "${{ inputs.node-version-file }}" ]; then
            echo "version=$(cat ${{ inputs.node-version-file }})" >> "$GITHUB_OUTPUT"
          else
            echo "version=24" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.resolve-node.outputs.version }}
          cache: yarn
          registry-url: https://npm.pkg.github.com
          scope: '@mvng-nz'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token || github.token }}

      - name: Build
        run: ${{ inputs.build-command }}

      # changesets/action (pinned to stable v1.9.0) manages ONLY the "Version
      # Packages" PR. We deliberately do NOT pass its `publish` input: the action's
      # publish path runs `changeset publish` (npm publish under the hood), which
      # does NOT rewrite `workspace:*` ranges. We publish in a shell step below with
      # Yarn instead, which rewrites those ranges at pack time.
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          version: ${{ inputs.version-script }}
          setupGitUser: ${{ inputs.setup-git-user }}
          github-token: ${{ inputs.github-token || github.token }}
        env:
          GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.packages-token || github.token }}

      # Everything below runs only once the Version PR has merged (no changesets
      # remain). `hasChangesets` is exposed by changesets/action precisely so
      # consumers can drive their own publishing.
      - name: Publish packages (Yarn rewrites workspace ranges)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: ${{ inputs.publish-script }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token || github.token }}
          NPM_TOKEN: ${{ secrets.npm-token }}

      - name: Tag and push
        if: steps.changesets.outputs.hasChangesets == 'false' && inputs.push-git-tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          yarn changeset tag
          git push --tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.packages-token || github.token }}

      - name: Create GitHub releases
        if: steps.changesets.outputs.hasChangesets == 'false' && inputs.create-github-releases
        run: |
          for tag in $(git tag --points-at HEAD); do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release $tag already exists, skipping"
            else
              gh release create "$tag" --title "$tag" --generate-notes
            fi
          done
        env:
          GH_TOKEN: ${{ inputs.github-token || github.token }}
